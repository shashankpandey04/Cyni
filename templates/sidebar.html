<!-- JavaScript for Sidebar Functionality -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  const sidebar = document.getElementById('sidebar');
  const sidebarOverlay = document.getElementById('sidebar-overlay');
  const sidebarToggle = document.getElementById('sidebar-toggle');
  const sidebarClose = document.getElementById('sidebar-close');
  const modulesToggle = document.querySelector('[data-collapse-toggle="modulesNav"]');
  const modulesNav = document.getElementById('modulesNav');

  // Toggle sidebar on mobile
  function toggleSidebar() {
    sidebar.classList.toggle('-translate-x-full');
    sidebarOverlay.classList.toggle('hidden');
  }

  // Close sidebar
  function closeSidebar() {
    sidebar.classList.add('-translate-x-full');
    sidebarOverlay.classList.add('hidden');
  }

  // Event listeners
  if (sidebarToggle) sidebarToggle.addEventListener('click', toggleSidebar);
  if (sidebarClose) sidebarClose.addEventListener('click', closeSidebar);
  if (sidebarOverlay) sidebarOverlay.addEventListener('click', closeSidebar);

  // Modules dropdown toggle
  if (modulesToggle && modulesNav) {
    modulesToggle.addEventListener('click', function() {
      const isExpanded = modulesToggle.getAttribute('aria-expanded') === 'true';
      modulesToggle.setAttribute('aria-expanded', !isExpanded);
      modulesNav.classList.toggle('hidden');
      
      const chevron = modulesToggle.querySelector('[data-lucide="chevron-down"]');
      if (chevron) {
        chevron.style.transform = isExpanded ? 'rotate(0deg)' : 'rotate(180deg)';
      }
    });
  }

  // Initialize Lucide icons
  if (typeof lucide !== 'undefined') {
    lucide.createIcons();
  }
});
</script>
